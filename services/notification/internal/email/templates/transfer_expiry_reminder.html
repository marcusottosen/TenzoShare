{{ define "content" }}
<p style="margin:0 0 20px;font-size:16px;font-weight:600;color:{{ .HeadingColor }};
          font-family:Arial,Helvetica,sans-serif;">Your transfer expires soon</p>

<!-- Expiry warning banner -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="margin-bottom:24px;">
  <tr>
    <td style="background-color:#fff7ed;border:1px solid #fdba74;border-radius:8px;
               padding:16px 20px;">
      <p style="margin:0;font-size:14px;color:#9a3412;line-height:1.6;
                font-family:Arial,Helvetica,sans-serif;">
        ⏱ This transfer will expire in less than <strong>24 hours</strong>.
        Download your files before the link becomes inactive.
      </p>
    </td>
  </tr>
</table>

<!-- Transfer details card -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="margin-bottom:28px;">
  <tr>
    <td style="background-color:{{ .CardBgColor }};border:1px solid {{ .CardBorderColor }};border-radius:8px;
               padding:20px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;width:90px;">Transfer</td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .Title }}</td>
        </tr>
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;">Expires</td>
          <td style="padding:5px 0;font-size:13px;color:#dc2626;font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .ExpiresAt }}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>

<!-- CTA button -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation">
  <tr>
    <td align="center">
      <a href="{{ .DownloadURL }}"
         style="display:inline-block;background-color:{{ .ButtonColor }};color:{{ .ButtonTextColor }};
                text-decoration:none;font-size:15px;font-weight:700;padding:13px 32px;
                border-radius:6px;font-family:Arial,Helvetica,sans-serif;">
        {{ .CTAButtonText }}
      </a>
    </td>
  </tr>
</table>
{{ end }}
