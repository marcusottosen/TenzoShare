{{ define "content" }}
<p style="margin:0 0 20px;font-size:16px;font-weight:600;color:{{ .HeadingColor }};
          font-family:Arial,Helvetica,sans-serif;">Transfer no longer available</p>

<!-- Revoked notice banner -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="margin-bottom:24px;">
  <tr>
    <td style="background-color:#fef2f2;border:1px solid #fca5a5;border-radius:8px;
               padding:16px 20px;">
      <p style="margin:0;font-size:14px;color:#991b1b;line-height:1.6;
                font-family:Arial,Helvetica,sans-serif;">
        🚫 The following transfer has been revoked by the sender and is
        <strong>no longer accessible</strong>.
      </p>
    </td>
  </tr>
</table>

<!-- Transfer details card -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="margin-bottom:28px;">
  <tr>
    <td style="background-color:{{ .CardBgColor }};border:1px solid {{ .CardBorderColor }};border-radius:8px;
               padding:20px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;width:90px;">Transfer</td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .Title }}</td>
        </tr>
        {{ if .SenderEmail }}
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;">Sender</td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .SenderEmail }}</td>
        </tr>
        {{ end }}
      </table>
    </td>
  </tr>
</table>

<p style="margin:0;font-size:14px;color:{{ .TextColor }};line-height:1.7;
          font-family:Arial,Helvetica,sans-serif;">
  If you still need these files, please contact the sender directly.
</p>
{{ end }}
