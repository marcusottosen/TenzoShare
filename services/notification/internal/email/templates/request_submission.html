{{ define "content" }}
<p style="margin:0 0 20px;font-size:16px;font-weight:600;color:{{ .HeadingColor }};
          font-family:Arial,Helvetica,sans-serif;">New file submission</p>

<p style="margin:0 0 24px;font-size:15px;color:{{ .TextColor }};line-height:1.7;
          font-family:Arial,Helvetica,sans-serif;">
  Someone has uploaded a file to your file request on
  <strong>{{ .AppName }}</strong>.
</p>

<!-- Submission details card -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation"
       style="margin-bottom:28px;">
  <tr>
    <td style="background-color:{{ .CardBgColor }};border:1px solid {{ .CardBorderColor }};border-radius:8px;
               padding:20px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;width:110px;">
            Request
          </td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .RequestName }}</td>
        </tr>
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;">File</td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .Filename }}</td>
        </tr>
        {{ if .SubmitterName }}
        <tr>
          <td style="padding:5px 0;font-size:13px;color:#64748b;
                     font-family:Arial,Helvetica,sans-serif;">Submitted by</td>
          <td style="padding:5px 0;font-size:13px;color:{{ .HeadingColor }};font-weight:600;
                     font-family:Arial,Helvetica,sans-serif;">{{ .SubmitterName }}</td>
        </tr>
        {{ end }}
      </table>
    </td>
  </tr>
</table>

<!-- CTA button -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation">
  <tr>
    <td align="center">
      <a href="{{ .ReviewURL }}"
         style="display:inline-block;background-color:{{ .ButtonColor }};color:{{ .ButtonTextColor }};
                text-decoration:none;font-size:15px;font-weight:700;padding:13px 32px;
                border-radius:6px;font-family:Arial,Helvetica,sans-serif;">
        {{ .CTAButtonText }}
      </a>
    </td>
  </tr>
</table>
{{ end }}
