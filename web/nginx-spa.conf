server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable nginx's 1 MB default body size limit.
    # Without this every upload > 1 MB is rejected with HTTP 413 by nginx,
    # before the request ever reaches the backend.
    client_max_body_size 0;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'self' blob:; frame-ancestors 'none'" always;

    # Remove server version disclosure
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets aggressively, never cache index.html
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Security headers must be repeated inside location blocks
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
    # dynamically. Without this, nginx resolves tenzoshare-gateway once at
    # startup and caches the IP forever — any container recreation (new IP)
    # causes 502s until nginx itself is restarted.
    # 127.0.0.11 is Docker's embedded DNS server; valid=10s forces re-resolution
    # every 10 seconds so a recreated gateway is picked up automatically.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API calls to the gateway
    location /api/ {
        # Must use a variable for proxy_pass when resolver is set, otherwise
        # nginx ignores the resolver directive and resolves at startup anyway.
        # Use $request_uri to preserve the full path — with a variable in
        # proxy_pass nginx does NOT perform location-prefix substitution, so
        # the entire original URI must be forwarded explicitly.
        set $gateway http://tenzoshare-gateway;
        proxy_pass $gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Do NOT buffer the request body — stream it directly to the backend.
        # Without this nginx would try to spool the entire file to a temp file
        # on disk before forwarding, which fails for very large uploads and
        # adds unnecessary latency for all uploads.
        proxy_request_buffering off;

        # Do NOT buffer the response body — stream it directly to the client.
        # Required for large file downloads to stream without nginx buffering
        # the entire file in memory / on disk first.
        proxy_buffering off;

        # Extended timeouts for large file transfers.
        # proxy_read_timeout is how long nginx waits for a chunk of data from
        # the backend; it resets on each chunk so a 50 GB upload at 10 Mbps
        # (~11 hours) will NOT time out as long as data keeps moving.
        proxy_connect_timeout  60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

