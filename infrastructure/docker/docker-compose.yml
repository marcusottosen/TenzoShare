# TenzoShare — Core Infrastructure (Phase 0)
# Brings up: PostgreSQL, Redis, MinIO, NATS JetStream, Traefik
# Usage: docker compose --env-file .env up -d

services:

  # ── API Gateway ──────────────────────────────────────────────────────────────
  gateway:
    image: traefik:v3.6.14
    container_name: tenzoshare-gateway
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP traffic
      - "8080:8080"   # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - tenzoshare-net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: tenzoshare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tenzoshare}
      POSTGRES_USER: ${POSTGRES_USER:-tenzoshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tenzoshare} -d ${POSTGRES_DB:-tenzoshare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tenzoshare-net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tenzoshare-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tenzoshare-net

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: tenzoshare-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tenzoshare-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=PathPrefix(`/minio-console/`)"
      - "traefik.http.routers.minio-console.middlewares=minio-strip"
      - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # ── NATS JetStream ────────────────────────────────────────────────────────────
  nats:
    image: nats:2.12.7-alpine
    container_name: tenzoshare-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - nats-data:/data
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tenzoshare-net

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  minio-data:
  nats-data:

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  tenzoshare-net:
    driver: bridge
    name: tenzoshare-net
