server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    # Retry failed pushes with backoff so Loki restarts don't lose log lines.
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 20

scrape_configs:
  # ── Docker service discovery ──────────────────────────────────────────────
  # Discovers all containers on the Docker socket and collects their stdout/stderr.
  # Only containers whose name starts with "tenzoshare-" are scraped.
  - job_name: tenzoshare_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["tenzoshare-"]

    relabel_configs:
      # Set service label from container name (strip leading /)
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service

    pipeline_stages:
      # ── Drop health-check and metrics noise from ALL services ──────────────
      # These endpoints are polled every few seconds and produce no useful signal.
      - drop:
          expression: '"path":"/health"'
      - drop:
          expression: '"path":"/metrics"'
      # Drop Traefik's health/metrics access log lines (they use RequestPath not path)
      - drop:
          expression: '"RequestPath":"/metrics"'

      # ── Parse JSON log lines (Zap production + RequestLogger output) ───────
      # Fields extracted here are available to downstream stages.
      # Silently no-ops on non-JSON lines (e.g. Fiber startup banner in dev mode).
      - json:
          expressions:
            level: level
            ts: ts          # Zap production: float Unix epoch
            msg: msg
            caller: caller
            user_id: user_id
            request_id: request_id
            email: email
            # Traefik access log fields
            traefik_time: time          # Traefik uses "time" (RFC3339), not "ts"

      # ── Fallback: extract level from Zap dev-mode text format ─────────────
      # Dev-mode format: "2006-01-02T15:04:05.000Z\tINFO\tcaller\tmessage\t{json}"
      # The regex only matches those lines (starting with a timestamp, not "{"),
      # so it is a no-op for JSON lines where json stage already set level.
      - regex:
          expression: '^\S+\t(?P<level>DEBUG|INFO|WARN|ERROR|DPANIC|PANIC|FATAL)\t'

      # ── Stream labels (LOW cardinality only — every unique combo = new stream) ──
      # 'service' is already set by relabel_configs; do NOT add it here.
      - labels:
          level:

      # ── Structured metadata for searchable-but-not-indexed fields ─────────
      # Structured metadata avoids label cardinality explosion for high-cardinality
      # values (UUIDs). They are stored per log line and fully queryable with
      # {service=~"..."} | user_id="<uuid>" in Grafana Loki datasource.
      - structured_metadata:
          user_id:
          request_id:
          email:
          msg:
          caller:

      # ── Timestamps ────────────────────────────────────────────────────────
      # Handle Zap production float Unix timestamp.
      # If 'ts' is empty (dev-mode or Traefik logs) the stage is a no-op and
      # Promtail falls back to the Docker log stream timestamp.
      - timestamp:
          source: ts
          format: Unix
          # If parsing fails (non-numeric), fall back gracefully to ingest time.
          action_on_failure: skip

