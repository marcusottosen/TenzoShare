server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker service discovery ──────────────────────────────────────────────
  # Discovers all containers on the Docker socket and collects their stdout/stderr.
  # Only containers whose name starts with "tenzoshare-" are scraped.
  - job_name: tenzoshare_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["tenzoshare-"]

    relabel_configs:
      # Set service label from container name (strip leading /)
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service

    pipeline_stages:
      # ── Parse Go/Zap/Traefik JSON log lines ────────────────────────────────
      - json:
          expressions:
            level: level
            ts: ts

      # Promote level to an indexed Loki stream label.
      # 'service' is already a stream label set by relabel_configs above —
      # do NOT include it here or it will overwrite the relabeled value with
      # an empty extracted entry.
      - labels:
          level:

      # Parse Zap's float Unix timestamp; falls back to ingest time on failure
      - timestamp:
          source: ts
          format: Unix
