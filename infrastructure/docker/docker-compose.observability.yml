# TenzoShare — Observability Stack (optional)
# Usage: docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: tenzoshare-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - tenzoshare-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:13.0.1
    container_name: tenzoshare-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - tenzoshare-net
    depends_on:
      prometheus:
        condition: service_healthy

  # ── Loki ──────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.1
    container_name: tenzoshare-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tenzoshare-net

  # ── Tempo ─────────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.10.5
    container_name: tenzoshare-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # HTTP query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tenzoshare-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  tenzoshare-net:
    external: true
    name: tenzoshare-net
