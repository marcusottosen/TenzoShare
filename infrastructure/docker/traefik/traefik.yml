# Traefik v3 — Static Configuration (Local/IP Profile)
# HTTP only on port 80. No TLS. Safe for local development on LAN/localhost.
# For TLS/enterprise profile, see traefik-enterprise.yml.

api:
  dashboard: true
  insecure: true   # dashboard reachable at :8080 — disable in production

entryPoints:
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        # 0 = no limit. Required for very large file uploads/downloads.
        # Default (60s) kills connections at ~60 s regardless of body size.
        readTimeout: 0
        writeTimeout: 0
    # Forward X-Forwarded headers from Traefik itself
    forwardedHeaders:
      insecure: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: tenzoshare-net
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  format: json

metrics:
  prometheus:
    entryPoint: traefik   # exposed on the :8080 dashboard port — internal only

# Ping endpoint used by Docker healthcheck
ping:
  entryPoint: web
