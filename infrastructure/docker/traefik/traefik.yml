# Traefik v3 — Static Configuration (Local/IP Profile)
# HTTP only on port 80. No TLS. Safe for local development on LAN/localhost.
# For TLS/enterprise profile, see traefik-enterprise.yml.

api:
  dashboard: true
  # WARNING: insecure: true is for LOCAL DEVELOPMENT ONLY.
  # Production MUST use insecure: false with authentication middleware.
  # With insecure: false, expose the dashboard via a labelled router in
  # docker-compose with the internal-only middleware (see dynamic/middlewares.yml).
  insecure: false  # dashboard requires an explicit authenticated router

entryPoints:
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        # 0 = no limit. Required for very large file uploads/downloads.
        # Default (60s) kills connections at ~60 s regardless of body size.
        readTimeout: 0
        writeTimeout: 0
    # Only trust X-Forwarded-* headers from known internal sources (Docker network).
    # Clients cannot spoof these headers to bypass rate limiting.
    # WARNING: insecure: true is for LOCAL DEVELOPMENT ONLY.
    # Production MUST use insecure: false with the appropriate trustedIPs.
    forwardedHeaders:
      insecure: false
      trustedIPs:
        - "127.0.0.1/32"
        - "172.16.0.0/12"   # Docker internal network range (172.16.x.x – 172.31.x.x)

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: tenzoshare-net
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  format: json

metrics:
  prometheus:
    entryPoint: traefik   # exposed on the :8080 dashboard port — internal only

# Ping endpoint used by Docker healthcheck
ping:
  entryPoint: web
