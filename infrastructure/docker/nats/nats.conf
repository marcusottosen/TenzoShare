# NATS Server Configuration — JetStream enabled

port: 4222
http_port: 8222

# Maximum payload size per message (8 MB)
max_payload: 8MB

# JetStream persistent streaming
jetstream {
  store_dir: "/data"
  max_mem_store: 512MB
  max_file_store: 10GB
}

# Logging
log_time: true
logfile_size_limit: 100MB
